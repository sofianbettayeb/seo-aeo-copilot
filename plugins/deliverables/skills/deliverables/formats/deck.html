<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{REPORT_TITLE}}</title>

<!--
  DECK FORMAT - 16:9 landscape slides, one slide per page.
  1. Open in any browser to read. To make a PDF: Cmd/Ctrl+P, "Save as PDF", set Layout to "Landscape", tick "Background graphics", set Margins to "None". Chrome gives the best result.
  2. Each slide is a <section class="slide">. The first is the cover (class "slide cover"). Keep each slide light: one idea, a headline, a few supporting blocks. Do not overfill.
  3. Branding lives in the :root BRANDING block. Override those variables to apply a brand.
-->

<style>
:root{
  /* ===== BRANDING (override these to apply a brand) ===== */
  --accent:#475569; --accent-ink:#334155;
  --dark:#1F2937;
  --heading:Georgia,"Times New Roman",serif;
  --body:-apple-system,system-ui,"Segoe UI",Roboto,Arial,sans-serif;
  /* ===== END BRANDING ===== */

  --ink:#10262E; --bg:#EEE7DA; --paper:#FFFFFF; --panel:#F4EFE6;
  --muted:#6B7B80; --line:#E5DCCD; --alert:#B5573F; --good:#3E7D55;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.deck{display:flex;flex-direction:column;align-items:center;gap:26px;padding:26px 16px 60px}
/* a slide is a 16:9 surface */
.slide{position:relative;width:297mm;max-width:100%;aspect-ratio:16/9;background:var(--paper);box-shadow:0 8px 44px rgba(8,30,38,.16);padding:14mm 16mm;overflow:hidden;display:flex;flex-direction:column}
.slide .kicker{color:var(--accent-ink);text-transform:uppercase;letter-spacing:.2em;font-size:.74rem;font-weight:600;margin:0}
.slide h2{font-family:var(--heading);font-style:italic;font-weight:400;font-size:2rem;line-height:1.08;margin:.25rem 0 0;color:var(--ink)}
.slide .srule{height:3px;background:var(--accent);width:54px;margin:.7rem 0 1rem}
.slide .body{flex:1;min-height:0}
.slide p{margin:.45rem 0;max-width:90ch}
.lead{font-size:1.15rem;color:#22454F}
.muted{color:var(--muted)} strong,b{color:var(--ink)} a{color:var(--accent-ink)}
ul,ol{margin:.5rem 0;padding-left:1.2rem} li{margin:.35rem 0}
h4{font-family:var(--body);font-weight:600;font-size:1rem;margin:0 0 .25rem;color:var(--accent-ink)}
/* slide number + brand strip */
.slide .pagenum{position:absolute;bottom:7mm;right:16mm;font-size:.68rem;color:var(--muted);letter-spacing:.05em}
.slide .brandtab{position:absolute;bottom:7mm;left:16mm;font-size:.68rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
/* cover slide */
.slide.cover{background:var(--dark);color:#F1EDE6;justify-content:center}
.slide.cover .logo{display:flex;align-items:center;gap:.7rem;margin-bottom:1.6rem}
.slide.cover .logo img,.slide.cover .logo .logo-img{height:30px}
.slide.cover .logo-word{font-family:var(--heading);font-style:italic;font-size:1.3rem;color:#F1EDE6}
.slide.cover .kicker{color:var(--accent)}
.slide.cover h1{font-family:var(--heading);font-style:italic;font-weight:400;font-size:3.2rem;line-height:1.02;margin:.5rem 0 0;color:#F6F1E8}
.slide.cover .sub{color:#A9BBC0;font-size:1.05rem;margin:1rem 0 0;max-width:64ch}
.slide.cover .meta{display:flex;flex-wrap:wrap;gap:.5rem 2rem;margin-top:2rem;font-size:.82rem;color:#8CA1A7}
.slide.cover .meta b{color:#E7DFD3;font-weight:600}
.slide.cover .pagenum,.slide.cover .brandtab{color:#7E939A}
/* grids on a slide */
.grid{display:grid;gap:18px;margin:.4rem 0}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:1fr 1fr}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);padding:1rem 1.1rem}
.card h4{margin-bottom:.3rem} .card p{font-size:.92rem;margin:.2rem 0 0}
/* stats */
.stats{display:flex;gap:24px;flex-wrap:wrap;margin:.4rem 0}
.stat{flex:1 1 0;min-width:150px}
.stat .v{font-family:var(--heading);font-style:italic;font-size:2.8rem;color:var(--accent-ink);line-height:1}
.stat .l{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:.35rem}
/* callout */
.callout{background:#FBF2E4;border:1px solid var(--accent);border-left:4px solid var(--accent);padding:1rem 1.2rem;margin:.6rem 0;font-size:1.02rem}
.callout b{color:var(--accent-ink)}
/* numbered points */
.points{display:grid;gap:1rem;margin:.6rem 0}
.point{display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:start}
.point .pn{font-family:var(--heading);font-style:italic;color:var(--accent);font-size:2rem;line-height:1}
/* tables */
table{width:100%;border-collapse:collapse;margin:.5rem 0;font-size:.9rem}
th,td{text-align:left;padding:.5rem .6rem;border-bottom:1px solid var(--line);vertical-align:top}
thead th{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--accent);font-weight:600}
td.num,th.num{text-align:right;white-space:nowrap}
/* badges */
.badge{display:inline-block;font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;padding:.12rem .55rem;border-radius:100px;white-space:nowrap;font-weight:600}
.b-crit{background:var(--alert);color:#fff}.b-high{border:1px solid var(--accent);color:var(--accent-ink)}.b-med{border:1px solid var(--muted);color:var(--muted)}
.p1{background:var(--accent);color:#fff}.p2{border:1px solid var(--accent);color:var(--accent-ink)}.p3{border:1px solid var(--muted);color:var(--muted)}
@media (max-width:900px){.g3,.g2{grid-template-columns:1fr}.slide{padding:8vw 7vw}}
@media print{
  @page{size:A4 landscape;margin:0}
  html,body{background:#fff}
  .deck{display:block;padding:0;gap:0}
  .slide{width:100%;max-width:none;height:100vh;aspect-ratio:auto;box-shadow:none;break-after:page;page-break-after:always}
  .slide:last-child{break-after:auto}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
}
</style>
</head>
<body>
<div class="deck">

  <!-- Cover -->
  <section class="slide cover">
    <div class="logo">
      <img class="logo-img" src="{{LOGO_SRC}}" alt="{{BRAND_NAME}}" onerror="this.style.display='none'">
      <span class="logo-word">{{BRAND_NAME}}</span>
    </div>
    <p class="kicker">{{REPORT_KICKER}}</p>
    <h1>{{REPORT_TITLE}}</h1>
    <p class="sub">{{REPORT_SUB}}</p>
    <div class="meta">
      <span>Prepared for <b>{{PREPARED_FOR}}</b></span>
      <span>By <b>{{PREPARED_BY}}</b></span>
      <span>Date <b>{{DATE}}</b></span>
    </div>
    <span class="brandtab">{{BRAND_NAME}}</span>
  </section>

  {{CONTENT}}

</div>
<script>
(function(){
  var img=document.querySelector('.slide.cover .logo-img');
  if(img && (!img.getAttribute('src') || img.getAttribute('src').indexOf('{{')===0)){img.style.display='none';}
  // auto-number content slides (cover is unnumbered)
  var slides=document.querySelectorAll('.slide:not(.cover)');
  slides.forEach(function(s,i){
    if(!s.querySelector('.pagenum')){
      var n=document.createElement('span');n.className='pagenum';n.textContent=(i+1);s.appendChild(n);
    }
    if(!s.querySelector('.brandtab')){
      var b=document.createElement('span');b.className='brandtab';b.textContent='{{BRAND_NAME}}';s.appendChild(b);
    }
  });
})();
</script>
</body>
</html>
